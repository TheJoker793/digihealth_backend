      ASPNETCORE_ENVIRONMENT: Development
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      CIM11__BaseUrl: http://cim11-api:80
      CIM11__ApiVersion: v2
      CIM11__Language: en
      ConnectionStrings__DefaultConnection: "Server=host.docker.internal,1433;Database=digihealth_patient;User ID=sa;Password=DigiHealth2024!;Encrypt=True;TrustServerCertificate=True;"

  rendezvous-service:
