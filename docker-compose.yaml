      auth-service:
        condition: service_started
      patient-service:
        condition: service_started
      rendezvous-service:
        condition: service_started
      dossier-medical-service:
        condition: service_started
      prescription-service:
        condition: service_started
      facturation-service:
        condition: service_started
      cim11-api:
        condition: service_started
      rabbitmq:
        condition: service_started
    environment:
      ASPNETCORE_URLS: http://+:80
      ASPNETCORE_ENVIRONMENT: Development

networks:
  digihealth-net:
    driver: bridge