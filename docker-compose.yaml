services:

  cim11-api:
    image: whoicd/icd-api
    container_name: cim11-api
    environment:
      - acceptLicense=true
      - saveAnalytics=false
      - include=2026-01_en
    ports:
      - "5008:80"
    networks:
      - digihealth-net
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:management-alpine
    container_name: digihealth-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - digihealth-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  auth-service:
    build:
      context: ./Auth-microservice
      dockerfile: Dockerfile
    container_name: digihealth-auth
    ports:
      - "5202:80"
    networks:
      - digihealth-net
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      cim11-api:
        condition: service_started
    environment:
      ASPNETCORE_URLS: http://+:80
      ASPNETCORE_ENVIRONMENT: Development
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Port: 5672
      RabbitMQ__Username: guest
      RabbitMQ__Password: guest
      CIM11__BaseUrl: http://cim11-api:80
      CIM11__ApiVersion: v2
      CIM11__Language: en
      ConnectionStrings__DefaultConnection: "Server=host.docker.internal,1433;Database=digihealth;User ID=sa;Password=DigiHealth2024!;Encrypt=True;TrustServerCertificate=True;"

  patient-service:
    build:
      context: ./Patient-microservice
      dockerfile: Dockerfile
    container_name: digihealth-patient
    ports:
      - "5100:80"
    networks:
      - digihealth-net
